<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SijanList - Smart Bookmark Manager</title>
    <link rel="icon" type="image/png" href="favicon.png"><link rel="shortcut icon" type="image/png" href="favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="Sortable.min.js"></script>
    
</head>
<body class="flex flex-col md:flex-row h-screen w-screen text-slate-200">

    <div id="default-bg"></div><div id="custom-bg-layer"></div><div id="bg-overlay"></div>
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>
    <div id="privacyIndicator" class="privacy-indicator shadow-[0_0_15px_rgba(168,85,247,0.3)]"><i class="fa-solid fa-eye-low-vision mr-2"></i>Privacy Mode Active</div>

    <main class="flex-1 flex flex-col h-full relative overflow-y-auto hide-scroll px-4 sm:px-8 py-8 z-10" id="mainArea">
        <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 w-full gap-5">
            <div class="flex items-center gap-2 overflow-x-auto hide-scroll w-full xl:w-auto pb-2 xl:pb-0" id="tabsContainer"></div>
            <div class="search-wrapper mt-2 xl:mt-0 shrink-0">
                <input type="text" id="searchInput" placeholder="Search page..." class="search-input"><i class="fa-solid fa-search search-icon"></i><div class="search-shortcut">⌘K</div>
            </div>
        </header>
        <div class="masonry-grid w-full transition-all duration-300" id="bookmarkGrid"></div>
    </main>

    <aside class="w-full md:w-20 lg:w-24 border-t md:border-t-0 md:border-l border-white/10 bg-black/30 backdrop-blur-2xl flex flex-row md:flex-col items-center justify-around md:justify-center gap-6 py-4 md:py-8 z-20 shrink-0 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] hide-scroll overflow-y-auto">
        <input type="file" id="importInput" accept=".json" class="hidden">
        <button class="tool-btn" data-tip="Search (Ctrl+K)" data-onclick="document.getElementById('searchInput').focus()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="tool-btn hover:!text-green-400 hover:!border-green-500/30 hover:shadow-[0_0_15px_rgba(34,197,94,0.2)]" id="privacyBtn" data-tip="Privacy Mode (P)" data-onclick="togglePrivacy()"><i class="fa-solid fa-eye"></i></button>
        <div class="hidden md:block h-px w-10 bg-white/10 my-1"></div>
        <button class="tool-btn" data-tip="Import JSON" data-onclick="document.getElementById('importInput').click()"><i class="fa-solid fa-file-import"></i></button>
        <button class="tool-btn" data-tip="Export JSON" data-onclick="exportBookmarks()"><i class="fa-solid fa-file-export"></i></button>
        <div class="hidden md:block h-px w-10 bg-white/10 my-1"></div>
        <button class="tool-btn hover:!text-cyan-400 hover:!border-cyan-500/30 hover:shadow-[0_0_15px_rgba(6,182,212,0.2)]" data-tip="Appearance" data-onclick="openSettingsModal()"><i class="fa-solid fa-palette"></i></button>
        <button class="tool-btn hover:!text-orange-400 hover:!border-orange-500/30 hover:shadow-[0_0_15px_rgba(249,115,22,0.2)]" data-tip="Trash" data-onclick="openTrashModal()"><i class="fa-solid fa-trash-can"></i></button>
        <button class="tool-btn hover:!text-purple-400 hover:!border-purple-500/30 hover:shadow-[0_0_15px_rgba(168,85,247,0.2)]" data-tip="About Developer" data-onclick="openAboutModal()"><i class="fa-solid fa-user-astronaut"></i></button>
        <button class="tool-btn hover:!text-red-400 hover:!border-red-500/30 hover:shadow-[0_0_15px_rgba(239,68,68,0.2)]" data-tip="Reset Data" data-onclick="resetData()"><i class="fa-solid fa-rotate-left"></i></button>
    </aside>

    <button class="fab fixed bottom-24 md:bottom-10 right-6 md:right-32 w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl z-30" data-onclick="openModal('add')"><i class="fa-solid fa-plus"></i></button>

    <!-- Unified Modals Container NO LONGER SHARED OVERLAY -->

    <!-- Bookmark Form Modal -->
    <div id="bookmarkModal" class="fixed inset-0 z-[110] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-lg p-8 transform scale-95 transition-all outline-none relative z-20" id="modalBox">
            <button class="absolute top-5 right-5 text-gray-400 hover:text-white" data-onclick="closeAllModals()"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-xl font-bold text-white mb-6" id="modalTitle"><i class="fa-solid fa-link text-cyan-400"></i> Add Bookmark</h2>
            <form id="bookmarkForm" data-onsubmit="saveBookmark(event)">
                <input type="hidden" id="bmMode" value="add"><input type="hidden" id="editBId"><input type="hidden" id="editId">
                <div class="space-y-4">
                    <div><label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">URL <span class="text-red-400">*</span></label><input type="url" id="bmUrl" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-cyan-400/50 transition-all"></div>
                    <div><label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Title <span class="text-red-400">*</span></label>
                        <div class="flex gap-2">
                            <input type="text" id="bmTitle" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none transition-all">
                            <button type="button" data-onclick="autoFillTitle()" class="px-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-white text-xs"><i class="fa-solid fa-wand-magic-sparkles text-cyan-400"></i> Fetch</button>
                        </div>
                    </div>
                    <div id="categoryWrapper"><label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Board <span class="text-red-400">*</span></label><select id="bmCategory" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none"></select></div>
                    <div><label class="block text-[11px] font-bold text-gray-400 uppercase mb-2 flex justify-between"><span>Description</span><span id="descCount">0 / 2000</span></label><textarea id="bmDesc" rows="3" maxlength="2000" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none resize-none" data-oninput="updateCharCount()"></textarea></div>
                </div>
                <div class="mt-8 flex justify-between items-center"><button type="button" class="text-gray-300 hover:text-white" data-onclick="closeAllModals()">Cancel</button><button type="submit" class="px-7 py-2.5 rounded-xl text-white bg-gradient-to-r from-purple-500 to-cyan-500 hover:opacity-90 shadow-lg" id="saveBtnText">Save</button></div>
            </form>
        </div>
    </div>

    <!-- Page/Board Modal -->
    <div id="pageModal" class="fixed inset-0 z-[110] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-sm p-8 transform scale-95 transition-all relative z-20" id="pageModalBox">
            <button class="absolute top-5 right-5 text-gray-400 hover:text-white" data-onclick="closeAllModals()"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-xl font-bold text-white mb-6" id="pageModalTitle">Modal</h2>
            <form id="addPageForm" data-onsubmit="savePageModal(event)">
                <input type="hidden" id="pType"><input type="hidden" id="pId">
                <div><label class="block text-xs font-semibold text-gray-400 uppercase mb-2" id="pageModalLabel">Name</label><input type="text" id="pInput" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none"></div>
                <div class="mt-8 flex justify-end gap-3"><button type="button" class="text-gray-300" data-onclick="closeAllModals()">Cancel</button><button type="submit" class="px-7 py-2.5 rounded-xl text-white bg-gradient-to-r from-blue-500 to-purple-500 shadow-lg" id="pageModalBtn">Create</button></div>
            </form>
        </div>
    </div>

    <!-- Appearance Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[110] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-3xl p-8 transform scale-95 transition-all flex flex-col max-h-[85vh] relative z-20" id="settingsModalBox">
            <button class="absolute top-5 right-5 text-gray-400 hover:text-white" data-onclick="closeAllModals()"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-xl font-bold text-white mb-6"><i class="fa-solid fa-palette text-cyan-400"></i> Appearance</h2>
            <div class="flex-1 overflow-y-auto modal-scroll pr-2 -mr-2"><div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-4" id="bgGallery"></div></div>
            <div class="mt-6 pt-6 border-t border-white/10 flex justify-end"><button class="px-7 py-2.5 rounded-xl text-white bg-cyan-500 shadow-lg" data-onclick="closeAllModals()">Done</button></div>
        </div>
    </div>

    <!-- About Developer Modal -->
    <div id="aboutModal" class="fixed inset-0 z-[110] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-sm p-8 transform scale-95 transition-all flex flex-col items-center text-center relative z-20" id="aboutModalBox">
            <button class="absolute top-5 right-5 text-gray-400 hover:text-white" data-onclick="closeAllModals()"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-purple-500 to-cyan-500 p-1 mb-4 shadow-[0_0_20px_rgba(168,85,247,0.4)]"><div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center"><i class="fa-solid fa-code text-3xl text-white"></i></div></div>
            <h2 class="text-2xl font-bold text-white mb-2">Mohammad Sijan</h2>
            <p class="text-sm text-slate-400 mb-8">Frontend Developer specializing in Agentic Workflows and AI Integration.</p>
            <button data-onclick="window.open('https://sijan.pro.bd/', '_blank'); closeAllModals();" class="px-8 py-3 w-full rounded-xl font-semibold text-white bg-gradient-to-r from-purple-500 to-cyan-500 shadow-lg hover:opacity-90">Visit Website</button>
        </div>
    </div>

    <!-- Trash Modal -->
    <div id="trashModal" class="fixed inset-0 z-[110] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-2xl p-8 transform scale-95 transition-all flex flex-col max-h-[85vh] relative z-20" id="trashModalBox">
            <button class="absolute top-5 right-5 text-gray-400 hover:text-white" data-onclick="closeAllModals()"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2 text-orange-400"><i class="fa-solid fa-trash-can"></i> Recycle Bin</h2>
            <div class="flex-1 overflow-y-auto modal-scroll pr-2 -mr-2 space-y-2 h-[40vh]" id="trashGrid"></div>
            <div class="mt-6 pt-6 border-t border-white/10 flex justify-between items-center">
                <button class="text-red-400 text-sm hover:text-red-300 font-semibold" data-onclick="emptyTrash()">Empty All</button>
                <button class="px-7 py-2.5 rounded-xl text-white bg-slate-600 hover:bg-slate-500 shadow-lg" data-onclick="closeAllModals()">Close</button>
            </div>
        </div>
    </div>

    <!-- Folder Modal -->
    <div id="folderModal" class="fixed inset-0 z-[60] flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm pointer-events-auto" data-onclick="closeAllModals()"></div>
        <div class="glass-card w-full max-w-4xl p-8 transform scale-95 transition-all flex flex-col max-h-[85vh] shadow-[0_20px_60px_rgba(0,0,0,0.6)] relative z-20" id="folderModalBox">
            <div class="flex justify-between items-center mb-6 pr-10">
                <h2 class="text-2xl font-bold text-white flex items-center gap-3" id="folderTitle"><i class="fa-solid fa-folder-open text-yellow-400"></i> Board View</h2>
                <button id="folderAddBtn" class="px-4 py-2 rounded-xl bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500 hover:text-white border border-cyan-500/30 transition-all text-xs font-bold flex items-center gap-2"><i class="fa-solid fa-plus"></i> Add Bookmark</button>
            </div>
            <div class="flex-1 overflow-y-auto modal-scroll pr-2 -mr-2" id="folderContent">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="folderGrid"></div>
            </div>
            <div class="mt-6 pt-6 border-t border-white/10 flex justify-end">
                <button class="px-7 py-2.5 rounded-xl text-white bg-slate-700 hover:bg-slate-600 shadow-lg" data-onclick="closeAllModals()">Close</button>
            </div>
        </div>
    </div>

    <!-- Dropdown -->
    <div id="boardMenu" class="glass-dropdown hidden absolute" role="menu">
        <button class="dropdown-item w-full text-left focus:outline-none focus:bg-white/10 focus:ring-2 focus:ring-cyan-500/50" data-onclick="handleMenuAction('edit')" role="menuitem" tabindex="0"><i class="fa-solid fa-pen w-4 text-blue-400"></i> Edit</button>
        <button class="dropdown-item w-full text-left focus:outline-none focus:bg-white/10 focus:ring-2 focus:ring-cyan-500/50" data-onclick="handleMenuAction('share')" role="menuitem" tabindex="0"><i class="fa-solid fa-share-nodes w-4 text-green-400"></i> Share</button>
        <div class="h-px bg-white/10 my-1 mx-2" role="separator"></div>
        <button class="dropdown-item danger w-full text-left focus:outline-none focus:bg-red-500/20 focus:ring-2 focus:ring-red-500/50" data-onclick="handleMenuAction('delete')" role="menuitem" tabindex="0"><i class="fa-solid fa-trash w-4"></i> Delete</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
